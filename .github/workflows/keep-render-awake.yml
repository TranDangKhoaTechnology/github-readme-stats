name: Keep Render Awake

on:
  schedule:
    # GitHub Actions supports scheduled workflows at a minimum interval of 5 minutes.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-awake
  cancel-in-progress: false

jobs:
  ping:
    name: Ping Render health endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send health check
        shell: bash
        env:
          HEALTH_URL: https://github-readme-stats-12.onrender.com/health
        run: |
          set -uo pipefail

          max_attempts=4
          retry_delay=15

          for attempt in $(seq 1 "$max_attempts"); do
            timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            response_file=$(mktemp)

            set +e
            http_code=$(curl \
              --silent \
              --show-error \
              --location \
              --connect-timeout 20 \
              --max-time 90 \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --header "User-Agent: github-actions-render-health-check/1.0" \
              "$HEALTH_URL")
            curl_exit=$?
            set -e

            response=$(tr -d '\n\r' < "$response_file")
            rm -f "$response_file"

            echo "[$timestamp] attempt=$attempt/$max_attempts curl_exit=$curl_exit http_status=$http_code response=$response"

            if [ "$curl_exit" -eq 0 ] &&
               [ "$http_code" = "200" ] &&
               printf '%s' "$response" | grep -q '"status":"ok"'; then
              echo "Render health check passed."
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Health check failed; retrying in ${retry_delay}s."
              sleep "$retry_delay"
            fi
          done

          echo "Render health check failed after $max_attempts attempts."
          exit 1
